<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Verify Email</title>
</head>

<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;padding:20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:8px;overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td
                            style="background-color:#000;color:#fff;padding:20px;text-align:center;font-size:20px;font-weight:bold;border: 1px solid #000;border-radius: 8px">
                            TNB Shop World
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:30px;color:#333;">
                            <h2 style="margin-top:0;">{{title}}</h2>

                            <p>{{description}}</p>

                            <!-- Button -->
                            <p style="text-align:center;margin:30px 0;">
                                <a href="{{verify_link}}"
                                    style="background:#000;color:#fff;padding:12px 24px;text-decoration:none;border-radius:5px;display:inline-block;">
                                    {{button_text}}
                                </a>
                            </p>

                            <p style="font-size:12px;color:#888;">
                                {{footer}}
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f1f3f5;padding:15px;text-align:center;font-size:12px;color:#666;">
                            © 2026 TNB Shop World. All rights reserved.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
